name: Daily News Spider

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawler
        run: |
          python -m src.main --sources sources.xlsx

      - name: Upload data and logs artifact
        uses: actions/upload-artifact@v4
        with:
          name: news-spider-output
          path: |
            data/
            logs/
          if-no-files-found: warn

      - name: Commit data and logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data logs
          if git diff --cached --quiet; then
            echo "No data/log changes to commit."
          else
            git commit -m "chore: update crawled news data"
            git push
          fi
